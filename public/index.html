<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Here Wars - 3D Bot Edition</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Arial', sans-serif; background: #000; }
        
        /* Oyun İçi Arayüz (UI) */
        #ui {
            position: absolute; bottom: 20px; left: 50%;
            transform: translateX(-50%); display: flex; gap: 15px; z-index: 10;
        }
        .card {
            width: 90px; height: 110px; background: #f0f0f0;
            border: 3px solid #222; border-radius: 12px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-weight: bold; cursor: pointer; user-select: none; box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            transition: transform 0.1s;
        }
        .card:hover { transform: scale(1.05); }
        .card.active { border-color: #ffcc00; background: #fffde6; }
        
        #iksir-bar {
            position: absolute; bottom: 145px; left: 50%;
            transform: translateX(-50%); width: 310px; height: 22px;
            background: #333; border: 2px solid #fff; border-radius: 11px; overflow: hidden; z-index: 10;
        }
        #iksir-doluluk {
            width: 0%; height: 100%; background: #e000e0;
            transition: width 0.1s linear;
        }
        #iksir-metin {
            position: absolute; width: 100%; text-align: center; color: white;
            font-weight: bold; font-size: 14px; line-height: 22px; z-index: 11;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="iksir-bar">
        <div id="iksir-metin">0 / 10</div>
        <div id="iksir-doluluk"></div>
    </div>
    
    <div id="ui">
        <div class="card" id="card-Sovalye" onclick="kartSec('Sovalye', 3)"><span>Şövalye</span><span>💧3</span></div>
        <div class="card" id="card-Okcu" onclick="kartSec('Okcu', 2)"><span>Okçu</span><span>💧2</span></div>
        <div class="card" id="card-Dev" onclick="kartSec('Dev', 5)"><span>Dev</span><span>💧5</span></div>
    </div>

    <script src="game.js"></script>
</body>
</html>
