<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Here Wars ⚔️</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-user-select:none; }
        body, html { width:100%; height:100%; overflow:hidden; background-color:#27ae60; font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }

        #sure-sayaci {
            position:absolute; top:20px; left:50%; transform:translateX(-50%);
            background:rgba(0,0,0,0.85); color:#fff; padding:8px 24px; font-size:28px; font-weight:bold;
            border-radius:20px; border:2px solid #f1c40f; z-index:10; letter-spacing:1px; display:none;
        }

        #menu-ekrani {
            position:absolute; top:0; left:0; width:100%; height:100%;
            background:linear-gradient(135deg, #1a365d 0%, #2a4365 100%);
            display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:20; padding:20px;
        }
        .logo-container { display:flex; align-items:center; gap:15px; margin-bottom:30px; }
        .game-title { color:#fff; font-size:42px; font-weight:900; text-transform:uppercase; letter-spacing:2px; text-shadow:3px 3px 0 #000; }

        .mod-secim-alani { display:flex; gap:10px; margin-bottom:20px; width:100%; max-width:400px; }
        .mod-btn { flex:1; padding:12px; background:#4a5568; color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer; font-size:14px; transition:all 0.2s; }
        .mod-btn.active { background:#3182ce; box-shadow:0 0 10px #3182ce; }

        #oda-paneli { display:none; flex-direction:column; gap:10px; width:100%; max-width:400px; background:rgba(255,255,255,0.1); padding:15px; border-radius:8px; margin-bottom:20px; }
        .oda-input { padding:10px; border-radius:6px; border:1px solid #cbd5e0; font-size:14px; }
        .oda-aksiyon-btn { padding:10px; background:#2b6cb0; color:white; border:none; border-radius:6px; font-weight:bold; cursor:pointer; }

        .lobi-kart-galeri { display:flex; gap:15px; margin-bottom:30px; }
        .menu-card-btn { background:white; border:2px solid #ccc; border-radius:8px; padding:10px; width:85px; text-align:center; cursor:pointer; }
        .menu-card-btn img { width:50px; height:50px; display:block; margin:0 auto 5px; }
        .basla-btn { background:#2ecc71; color:white; border:none; padding:15px 60px; font-size:22px; font-weight:bold; border-radius:30px; cursor:pointer; box-shadow:0 5px 15px rgba(46,204,113,0.4); text-shadow:1px 1px 2px rgba(0,0,0,0.3); }

        #oyun-ui {
            position:absolute; bottom:0; left:0; width:100%; background:rgba(44,62,80,0.95); border-top:3px solid #1a252f;
            padding:12px 10px; z-index:10; display:none;
        }
        .iksir-bari-konteyner { width:100%; max-width:500px; margin:0 auto 10px; background:#34495e; border:2px solid #2c3e50; border-radius:10px; position:relative; height:24px; overflow:hidden; }
        #iksir-doluluk { width:0%; height:100%; background:linear-gradient(90deg, #2980b9, #3498db); transition:width 0.1s linear; }
        #iksir-metin { position:absolute; width:100%; text-align:center; top:1px; left:0; color:white; font-weight:bold; font-size:14px; text-shadow:1px 1px 2px black; }

        .kartlar-konteyner { display:flex; justify-content:center; gap:12px; max-width:500px; margin:0 auto; }
        .card { background:#fff; border:3px solid #bdc3c7; border-radius:8px; width:80px; padding:8px 4px; text-align:center; font-weight:bold; font-size:13px; color:#2c3e50; position:relative; box-shadow:0 4px 6px rgba(0,0,0,0.3); }
        .card.active { border-color:#f1c40f; background:#fbc531; transform:scale(1.05); }
        .card .maliyet { color:#2980b9; font-size:11px; margin-top:4px; display:block; }
        .card img { width:40px; height:40px; display:block; margin:0 auto 4px; }

        #mac-sonu-ekrani {
            position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:30;
            display:none; flex-direction:column; align-items:center; justify-content:center; color:white; font-size:36px; font-weight:bold; text-align:center; line-height:1.6;
        }
        canvas { display:block; width:100%; height:100%; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="sure-sayaci">03:00</div>

    <div id="menu-ekrani">
        <div class="logo-container"><h1 class="game-title">HERE WARS ⚔️</h1></div>

        <div class="mod-secim-alani">
            <button id="mod-bot" class="mod-btn active" onclick="oyunModuSec('bot')">Bot Savaş</button>
            <button id="mod-online" class="mod-btn" onclick="oyunModuSec('online')">Online Maç</button>
            <button id="mod-friend" class="mod-btn" onclick="oyunModuSec('friend')">Arkadaşla Oyna</button>
        </div>

        <div id="oda-paneli">
            <input type="text" id="oda-kod-input" class="oda-input" placeholder="Oda Kodu (Örn: 1907)">
            <input type="password" id="oda-sifre-input" class="oda-input" placeholder="Oda Şifresi">
            <button class="oda-aksiyon-btn" onclick="odaEylemi('kur')">Oda Kur</button>
            <button class="oda-aksiyon-btn" style="background:#27ae60;" onclick="odaEylemi('katil')">Odaya Katıl</button>
        </div>

        <p style="color:white; margin-bottom:10px; font-weight:bold;">Savaşa Gireceğin Kartı Seç:</p>
        <div class="lobi-kart-galeri">
            <div id="menu-btn-Sovalye" class="menu-card-btn" style="border:3px solid #2ecc71; background:#e8f8f5;" onclick="menudeKartSec('Sovalye', 3)">
                <img src="https://cdn-icons-png.flaticon.com/512/3185/3185744.png" alt="Şövalye"> 
                Şövalye <span style="color:#2980b9; display:block; font-size:11px;">💧 3</span>
            </div>
            <div id="menu-btn-Okcu" class="menu-card-btn" onclick="menudeKartSec('Okcu', 2)">
                <img src="https://cdn-icons-png.flaticon.com/512/3185/3185812.png" alt="Okçu">
                Okçu <span style="color:#2980b9; display:block; font-size:11px;">💧 2</span>
            </div>
            <div id="menu-btn-Dev" class="menu-card-btn" onclick="menudeKartSec('Dev', 5)">
                <img src="https://cdn-icons-png.flaticon.com/512/3185/3185747.png" alt="Dev">
                Dev <span style="color:#2980b9; display:block; font-size:11px;">💧 5</span>
            </div>
        </div>

        <button class="basla-btn" onclick="oyunuBaslat()">SAVAŞA BAŞLA</button>
    </div>

    <div id="oyun-ui">
        <div class="iksir-bari-konteyner">
            <div id="iksir-doluluk"></div>
            <div id="iksir-metin">0 / 10</div>
        </div>

        <div class="kartlar-konteyner">
            <div id="card-Sovalye" class="card" onclick="kartSec('Sovalye', 3)">
                <img src="https://cdn-icons-png.flaticon.com/512/3185/3185744.png" alt="Şövalye">
                Şövalye <span class="maliyet">💧 3</span>
            </div>
            <div id="card-Okcu" class="card" onclick="kartSec('Okcu', 2)">
                <img src="https://cdn-icons-png.flaticon.com/512/3185/3185812.png" alt="Okçu">
                Okçu <span class="maliyet">💧 2</span>
            </div>
            <div id="card-Dev" class="card" onclick="kartSec('Dev', 5)">
                <img src="https://cdn-icons-png.flaticon.com/512/3185/3185747.png" alt="Dev">
                Dev <span class="maliyet">💧 5</span>
            </div>
        </div>
    </div>

    <div id="mac-sonu-ekrani"></div>

    <script src="game.js"></script>
</body>
</html>
